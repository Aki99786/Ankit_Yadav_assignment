version: '3'

services:

  app:
    image: 451712634800.dkr.ecr.ap-south-1.amazonaws.com/sample-devops-app:latest # Trigger pipeline

    container_name: sample-app

    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3001:3000"
