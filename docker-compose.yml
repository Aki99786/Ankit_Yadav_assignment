version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Docker Compose — Local development & testing environment
#  Mirrors the production Kubernetes setup as closely as possible
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    container_name: immerverse-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: "1.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - immerverse-net
    labels:
      prometheus.io/scrape: "true"
      prometheus.io/port: "3000"
      prometheus.io/path: "/metrics"

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: immerverse-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - immerverse-net
    depends_on:
      - app

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: immerverse-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
    networks:
      - immerverse-net
    depends_on:
      - prometheus

networks:
  immerverse-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
