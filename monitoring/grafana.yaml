---
# ─────────────────────────────────────────────────────────────────────────────
#  Grafana — Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: immerverse
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
              name: grafana-http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "ImmerVerse@2024"      # ← change in production; use a Secret
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.immerverse.your-domain.com"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards

---
# ─────────────────────────────────────────────────────────────────────────────
#  Grafana — Service
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: immerverse
  labels:
    app: grafana
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 80
      targetPort: 3000

---
# ─────────────────────────────────────────────────────────────────────────────
#  Grafana — Datasource provisioning (auto-connect to Prometheus)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: immerverse
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false

---
# ─────────────────────────────────────────────────────────────────────────────
#  Grafana — Dashboard provisioning config
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: immerverse
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'ImmerVerse'
        orgId: 1
        folder: 'ImmerVerse'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards

---
# ─────────────────────────────────────────────────────────────────────────────
#  Grafana — Dashboard JSON (ImmerVerse App Overview)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: immerverse
data:
  immerverse-dashboard.json: |
    {
      "id": null,
      "uid": "immerverse-overview",
      "title": "ImmerVerse App Overview",
      "tags": ["immerverse", "nodejs"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total HTTP Requests",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "http_requests_total",
              "legendFormat": "Requests",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Heap Memory Used (MB)",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "nodejs_heap_size_bytes / 1024 / 1024",
              "legendFormat": "Heap MB",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Process Uptime (hours)",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "process_uptime_seconds / 3600",
              "legendFormat": "Uptime h",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Running Pods",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "count(up{job='immerverse-app'} == 1)",
              "legendFormat": "Pods",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "HTTP Requests Rate (per minute)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "rate(http_requests_total[1m]) * 60",
              "legendFormat": "req/min",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Memory Usage (MB)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "nodejs_rss_bytes / 1024 / 1024",
              "legendFormat": "RSS MB",
              "refId": "A"
            },
            {
              "expr": "nodejs_heap_size_bytes / 1024 / 1024",
              "legendFormat": "Heap MB",
              "refId": "B"
            }
          ]
        }
      ]
    }
