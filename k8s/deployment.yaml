---
# ─────────────────────────────────────────────────────────────────────────────
#  Kubernetes Deployment
#  Manages the replica set for the ImmerVerse application
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immerverse-app
  namespace: immerverse
  labels:
    app: immerverse-app
    version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3                        # 3 replicas for high availability
  selector:
    matchLabels:
      app: immerverse-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                    # Allow 1 extra pod during update
      maxUnavailable: 0              # Never take pods offline during update
  template:
    metadata:
      labels:
        app: immerverse-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      # ── Security: run as non-root ─────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: immerverse-app
          image: your-dockerhub-username/immerverse-cicd-app:latest   # ← Jenkins updates this
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # ── Liveness probe: restart container if unhealthy ──────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          # ── Readiness probe: only send traffic when ready ───────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # ── Startup probe: extra time for slow starts ───────────────────
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10

      # ── Pod anti-affinity: spread across nodes ────────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - immerverse-app
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
