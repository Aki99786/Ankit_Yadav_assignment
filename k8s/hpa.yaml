---
# ─────────────────────────────────────────────────────────────────────────────
#  Kubernetes HorizontalPodAutoscaler
#  Scales replicas based on CPU / memory usage
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: immerverse-hpa
  namespace: immerverse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: immerverse-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70     # Scale up when avg CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80     # Scale up when avg Memory > 80%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30    # Scale up faster
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
